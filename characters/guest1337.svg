<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Guest 1337: White face, blue swept hair, angry look, camo tactical vest -->

  <!-- Blue swept hair (swept to the right) -->
  <path d="M30 12 Q35 -2 55 -4 Q70 -5 75 5 L72 14 L28 14 Z" fill="#2244bb"/>
  <path d="M55 -4 Q72 -8 80 2 L76 10 L70 -2 Z" fill="#3355cc"/>
  <path d="M35 0 Q42 -6 55 -6 L50 -1 Z" fill="#3355cc"/>

  <!-- Head - WHITE face -->
  <rect x="25" y="10" width="50" height="48" rx="5" fill="#e8e8e8"/>
  <rect x="28" y="13" width="44" height="42" rx="3" fill="#f0f0f0"/>

  <!-- Angry eyebrows -->
  <line x1="33" y1="24" x2="44" y2="28" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="28" x2="67" y2="24" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small serious eyes -->
  <circle cx="40" cy="32" r="3" fill="#1a1a1a"/>
  <circle cx="60" cy="32" r="3" fill="#1a1a1a"/>

  <!-- Small frown/serious mouth -->
  <path d="M42 46 Q50 42 58 46" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body - camo tactical vest -->
  <rect x="22" y="58" width="56" height="40" rx="4" fill="#6b7a5a"/>
