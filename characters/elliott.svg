<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Elliott: Red character throwing pizza -->

  <!-- Head -->
  <rect x="25" y="5" width="50" height="50" rx="5" fill="#cc2222"/>
  <!-- Headband/hat area -->
  <rect x="25" y="5" width="50" height="18" rx="5" fill="#dd3333"/>
  <rect x="25" y="18" width="50" height="5" fill="#aa1111"/>

  <!-- Eyes -->
  <circle cx="40" cy="30" r="5" fill="white"/>
  <circle cx="40" cy="30" r="2.5" fill="#1a1a1a"/>
  <circle cx="60" cy="30" r="5" fill="white"/>
  <circle cx="60" cy="30" r="2.5" fill="#1a1a1a"/>

  <!-- Grin -->
  <path d="M38 42 Q50 52 62 42" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Body - red outfit -->
  <rect x="22" y="55" width="56" height="42" rx="4" fill="#cc2222"/>
  <rect x="30" y="58" width="40" height="36" rx="2" fill="#dd3333"/>
  <!-- X on chest -->
  <line x1="38" y1="64" x2="62" y2="84" stroke="#aa1111" stroke-width="3"/>
  <line x1="62" y1="64" x2="38" y2="84" stroke="#aa1111" stroke-width="3"/>

  <!-- Legs -->
  <rect x="22" y="97" width="24" height="20" rx="3" fill="#aa1111"/>
  <rect x="54" y="97" width="24" height="20" rx="3" fill="#aa1111"/>

  <!-- Arms -->
  <rect x="10" y="58" width="14" height="28" rx="5" fill="#cc2222"/>
  <!-- Right arm raised holding pizza -->
  <rect x="76" y="42" width="14" height="35" rx="5" fill="#cc2222" transform="rotate(-15 83 60)"/>

  <!-- Pizza in right hand -->
  <polygon points="88,38 99,30 95,48" fill="#f5cd30"/>
  <polygon points="89,40 97,33 94,46" fill="#ff8c00"/>
  <circle cx="92" cy="39" r="2" fill="#cc2222"/>
</svg>
