<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Noob: Classic yellow Roblox character, emotional/crying look -->

  <!-- Head - bright yellow -->
  <rect x="25" y="5" width="50" height="50" rx="6" fill="#f5cd30"/>
  <rect x="28" y="8" width="44" height="44" rx="4" fill="#fada50"/>

  <!-- Big teary eyes -->
  <circle cx="40" cy="26" r="7" fill="white"/>
  <circle cx="40" cy="27" r="4.5" fill="#1a1a1a"/>
  <circle cx="40" cy="25" r="2" fill="white"/>
  <circle cx="60" cy="26" r="7" fill="white"/>
  <circle cx="60" cy="27" r="4.5" fill="#1a1a1a"/>
  <circle cx="60" cy="25" r="2" fill="white"/>

  <!-- Tear drops -->
  <ellipse cx="34" cy="36" rx="2.5" ry="4" fill="#66bbff" opacity="0.6"/>
  <ellipse cx="66" cy="34" rx="2" ry="3.5" fill="#66bbff" opacity="0.5"/>

  <!-- Wobbly/wavy mouth (sad/emotional) -->
  <path d="M38 44 Q44 40 50 44 Q56 48 62 44" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Body - classic blue top -->
  <rect x="25" y="55" width="50" height="40" rx="4" fill="#4a86c8"/>
  <rect x="29" y="58" width="42" height="34" rx="2" fill="#5a9ad8"/>

  <!-- Legs - green pants (classic Noob) -->
  <rect x="25" y="95" width="22" height="22" rx="3" fill="#5a9a3a"/>
  <rect x="53" y="95" width="22" height="22" rx="3" fill="#5a9a3a"/>
  <!-- Shoes -->
  <rect x="23" y="112" width="26" height="8" rx="3" fill="#4a4a4a"/>
  <rect x="51" y="112" width="26" height="8" rx="3" fill="#4a4a4a"/>

  <!-- Arms (yellow skin) -->
  <rect x="12" y="58" width="14" height="26" rx="5" fill="#f5cd30"/>
  <rect x="74" y="58" width="14" height="26" rx="5" fill="#f5cd30"/>
</svg>
