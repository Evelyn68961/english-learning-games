<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- 007n7: Spy with burger on head, blue police/spy uniform -->

  <!-- Burger on head -->
  <ellipse cx="50" cy="2" rx="18" ry="7" fill="#d4923a"/><!-- top bun -->
  <rect x="33" y="0" width="34" height="5" fill="#8BC34A"/><!-- lettuce -->
  <rect x="34" y="3" width="32" height="5" fill="#b5651d"/><!-- patty -->
  <ellipse cx="50" cy="9" rx="19" ry="7" fill="#e8a840"/><!-- bottom bun -->

  <!-- Head -->
  <rect x="25" y="12" width="50" height="46" rx="5" fill="#deb887"/>

  <!-- Eyes -->
  <circle cx="40" cy="30" r="5" fill="white"/>
  <circle cx="40" cy="30" r="2.5" fill="#1a1a1a"/>
  <circle cx="60" cy="30" r="5" fill="white"/>
  <circle cx="60" cy="30" r="2.5" fill="#1a1a1a"/>

  <!-- Mouth -->
  <rect x="40" y="44" width="20" height="3" rx="1.5" fill="#c0a080"/>

  <!-- Body - blue spy/police uniform -->
  <rect x="22" y="58" width="56" height="40" rx="4" fill="#2a4a8a"/>
  <rect x="30" y="61" width="40" height="34" rx="2" fill="#3a5a9a"/>
  <!-- Badge -->
  <circle cx="38" cy="70" r="4" fill="#FFD700"/>
  <circle cx="38" cy="70" r="2" fill="#FFA500"/>
  <!-- Belt -->
  <rect x="25" y="85" width="50" height="5" fill="#2a2a2a"/>
  <rect x="46" y="84" width="8" height="7" rx="1" fill="#c0c0c0"/>

  <!-- Legs -->
  <rect x="22" y="98" width="24" height="20" rx="3" fill="#1a2a4a"/>
  <rect x="54" y="98" width="24" height="20" rx="3" fill="#1a2a4a"/>

  <!-- Arms -->
  <rect x="10" y="60" width="14" height="28" rx="5" fill="#deb887"/>
  <rect x="76" y="60" width="14" height="28" rx="5" fill="#deb887"/>
</svg>
