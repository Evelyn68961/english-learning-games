<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- 1x1x1x1: Mysterious dark teal figure with glowing green elements -->

  <!-- Head -->
  <rect x="25" y="5" width="50" height="50" rx="5" fill="#0d3d3d"/>
  <rect x="28" y="8" width="44" height="44" rx="3" fill="#0a4a4a"/>

  <!-- Glowing green eyes -->
  <rect x="33" y="18" width="14" height="10" rx="2" fill="#00ff88" opacity="0.85"/>
  <rect x="35" y="20" width="10" height="6" rx="1" fill="#66ffbb"/>
  <rect x="53" y="18" width="14" height="10" rx="2" fill="#00ff88" opacity="0.85"/>
  <rect x="55" y="20" width="10" height="6" rx="1" fill="#66ffbb"/>

  <!-- Glowing mouth line -->
  <rect x="36" y="38" width="28" height="3" rx="1.5" fill="#00ff88" opacity="0.5"/>

  <!-- Glowing code/symbols on face -->
  <text x="40" y="50" font-size="5" fill="#00ff88" opacity="0.3" font-family="monospace">1x1x1</text>

  <!-- Body -->
  <rect x="20" y="55" width="60" height="45" rx="4" fill="#0d3d3d"/>
  <rect x="24" y="58" width="52" height="38" rx="2" fill="#0a4a4a"/>

  <!-- Glowing circuit lines on body -->
  <line x1="35" y1="62" x2="65" y2="62" stroke="#00ff88" stroke-width="1.5" opacity="0.3"/>
  <line x1="50" y1="62" x2="50" y2="90" stroke="#00ff88" stroke-width="1.5" opacity="0.3"/>
  <line x1="35" y1="76" x2="65" y2="76" stroke="#00ff88" stroke-width="1.5" opacity="0.2"/>
  <rect x="44" y="66" width="12" height="6" rx="1" fill="#00ff88" opacity="0.15"/>

  <!-- Legs -->
  <rect x="20" y="100" width="24" height="18" rx="3" fill="#0d3d3d"/>
  <rect x="56" y="100" width="24" height="18" rx="3" fill="#0d3d3d"/>

  <!-- Arms -->
  <rect x="8" y="58" width="14" height="32" rx="5" fill="#0d3d3d"/>
  <rect x="78" y="58" width="14" height="32" rx="5" fill="#0d3d3d"/>

  <!-- Glow aura effect -->
  <rect x="25" y="5" width="50" height="50" rx="5" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
</svg>
