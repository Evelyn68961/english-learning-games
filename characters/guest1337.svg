  <rect x="8" y="58" width="16" height="30" rx="5" fill="#d0d0d0"/>
  <rect x="10" y="60" width="12" height="14" rx="3" fill="#e0e0e0"/>
  <rect x="10" y="76" width="12" height="10" rx="3" fill="#b0b0b0"/>
  <rect x="76" y="58" width="16" height="30" rx="5" fill="#d0d0d0"/>
  <rect x="78" y="60" width="12" height="14" rx="3" fill="#e0e0e0"/>
