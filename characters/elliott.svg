<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Elliott: Yellow face, red ROBLOX cap, red shirt, yellow arms, dark pants, holding pizza -->

  <!-- Red cap -->
  <rect x="22" y="2" width="56" height="12" rx="3" fill="#dd2222"/>
  <rect x="20" y="10" width="60" height="5" rx="2" fill="#cc1a1a"/>
  <!-- ROBLOX text on cap -->
  <text x="50" y="10" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">ROBLOX</text>

  <!-- Head - yellow -->
  <rect x="25" y="12" width="50" height="46" rx="5" fill="#f5cd30"/>
  <rect x="28" y="15" width="44" height="40" rx="3" fill="#fada50"/>

  <!-- Happy squinted eyes (^^ style) -->
  <path d="M34 30 L40 25 L46 30" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M54 30 L60 25 L66 30" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Big open happy mouth -->
  <ellipse cx="50" cy="44" rx="10" ry="7" fill="#cc2222"/>
  <ellipse cx="50" cy="42" rx="8" ry="3" fill="#1a1a1a" opacity="0.3"/>

  <!-- Body - red shirt -->
  <rect x="22" y="58" width="56" height="38" rx="4" fill="#dd2222"/>
  <rect x="28" y="61" width="44" height="32" rx="2" fill="#ee3333"/>
  <!-- Collar/neckline (dark V shape) -->
  <polygon points="42,58 50,66 58,58" fill="#1a1a2e"/>
  <!-- Center line on shirt -->
  <line x1="50" y1="66" x2="50" y2="93" stroke="#cc1a1a" stroke-width="1.5"/>

  <!-- Legs - dark navy/black pants -->
  <rect x="22" y="96" width="24" height="22" rx="3" fill="#1a1a2e"/>
  <rect x="54" y="96" width="24" height="22" rx="3" fill="#1a1a2e"/>

  <!-- Left arm (yellow skin) -->
  <rect x="10" y="60" width="14" height="28" rx="5" fill="#f5cd30"/>

  <!-- Right arm (yellow, raised up holding pizza) -->
  <rect x="76" y="42" width="14" height="32" rx="5" fill="#f5cd30" transform="rotate(-20 83 58)"/>

  <!-- Pizza slice in right hand -->
  <polygon points="82,34 98,24 96,46" fill="#f5cd30"/>
  <polygon points="83,36 96,27 95,44" fill="#e8b820"/>
  <!-- Pepperoni -->
  <circle cx="89" cy="34" r="2" fill="#cc2222"/>
  <circle cx="91" cy="39" r="1.8" fill="#cc2222"/>
  <circle cx="87" cy="38" r="1.5" fill="#cc2222"/>
</svg>
