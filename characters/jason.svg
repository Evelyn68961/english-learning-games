<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Jason: Hockey mask horror character (Jason Voorhees inspired) -->

  <!-- Head -->
  <rect x="25" y="5" width="50" height="50" rx="5" fill="#4a4a3a"/>

  <!-- Hockey mask -->
  <rect x="28" y="8" width="44" height="44" rx="10" fill="#e8dcc8"/>
  <ellipse cx="50" cy="30" rx="20" ry="22" fill="#d8ccb0"/>

  <!-- Mask lines -->
  <line x1="50" y1="10" x2="50" y2="50" stroke="#a09080" stroke-width="1.5"/>
  <line x1="30" y1="22" x2="70" y2="22" stroke="#a09080" stroke-width="1.5"/>
  <line x1="30" y1="34" x2="70" y2="34" stroke="#a09080" stroke-width="1.5"/>

  <!-- Eye holes -->
  <ellipse cx="40" cy="24" rx="6" ry="5" fill="#1a1a1a"/>
  <circle cx="40" cy="24" r="2" fill="#8a0000" opacity="0.7"/>
  <ellipse cx="60" cy="24" rx="6" ry="5" fill="#1a1a1a"/>
  <circle cx="60" cy="24" r="2" fill="#8a0000" opacity="0.7"/>

  <!-- Nose/mouth area -->
  <polygon points="47,30 50,35 53,30" fill="#b0a090"/>
  <rect x="42" y="40" width="16" height="3" rx="1.5" fill="#8a7a6a"/>

  <!-- Body - dark green/brown outfit -->
  <rect x="22" y="55" width="56" height="42" rx="4" fill="#3a4a3a"/>
  <rect x="28" y="58" width="44" height="36" rx="2" fill="#4a5a4a"/>

  <!-- Legs -->
  <rect x="22" y="97" width="24" height="20" rx="3" fill="#2a3a2a"/>
  <rect x="54" y="97" width="24" height="20" rx="3" fill="#2a3a2a"/>

  <!-- Arms -->
  <rect x="10" y="58" width="14" height="30" rx="5" fill="#4a4a3a"/>
  <rect x="76" y="58" width="14" height="30" rx="5" fill="#4a4a3a"/>

  <!-- Machete in right hand (subtle) -->
  <rect x="86" y="50" width="3" height="38" rx="1" fill="#c0c0c0"/>
  <rect x="84" y="84" width="7" height="6" rx="1" fill="#5a4a3a"/>
</svg>
