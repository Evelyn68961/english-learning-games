<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Garden Defense</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== TITLE SCREEN ===== -->
<div id="title-screen" class="screen active">
    <div class="title-logo">🌻 Word Garden</div>
    <div class="title-sub">Defend your garden with English!</div>
    <div class="title-scene">
        <div class="title-sunflower">
            <div class="sunflower-head">
                <div class="sunflower-face">
                    <span class="sf-eye"></span><span class="sf-eye"></span>
                    <div class="sf-smile"></div>
                </div>
            </div>
            <div class="sunflower-stem"></div>
        </div>
        <div class="title-zombie">
            <div class="zombie-head-t">
                <div class="zombie-eyes-t">
                    <div class="z-eye-t"></div>
                    <div class="z-eye-t"></div>
                </div>
            </div>
            <div class="zombie-arms-t">
                <div class="z-arm-t left"></div>
                <div class="z-arm-t right"></div>
            </div>
            <div class="zombie-body-t"></div>
            <div class="zombie-legs-t">
                <div class="z-leg-t"></div>
                <div class="z-leg-t"></div>
            </div>
        </div>
    </div>
    <button class="big-play-btn" onclick="showThemes()">PLAY</button>
</div>

<!-- ===== THEME SELECT ===== -->
<div id="theme-screen" class="screen">
    <div class="theme-title">Pick a Theme!</div>
    <div class="theme-sub">Learn new words in each world</div>
    <div class="level-toggle">
        <button class="level-btn" data-level="elementary" onclick="setLevel('elementary')">國小 Elementary</button>
        <button class="level-btn selected" data-level="junior" onclick="setLevel('junior')">國中 Junior High</button>
    </div>
    <div class="theme-grid" id="theme-grid"></div>
    <button class="back-btn" onclick="showTitle()">← Back</button>
</div>

<!-- ===== GAME ===== -->
<canvas id="game-canvas"></canvas>

<div class="hud" id="hud">
    <div class="hud-group">
        <div class="hud-item hud-sun">☀️ <span id="hud-sun">100</span></div>
        <button class="ask-btn" id="ask-btn" onclick="requestManualQuestion()">
            📝 <span class="ask-btn-label">+50 ☀️</span>
        </button>
    </div>
    <div class="hud-group">
        <div class="hud-item hud-score">⭐ <span id="hud-score">0</span></div>
        <div class="hud-item hud-wave">Wave <span id="hud-wave">1</span>/<span id="hud-total-waves">5</span></div>
        <div class="hud-item hud-lives"><span id="hud-lives" class="lives-hearts">❤️❤️❤️</span></div>
    </div>
</div>

<div class="plant-cards" id="plant-cards"></div>

<div class="question-panel" id="question-panel">
    <div class="q-image" id="q-image"></div>
    <div class="q-prompt" id="q-prompt"></div>
    <div class="q-hint" id="q-hint"></div>
    <div class="q-options" id="q-options"></div>
</div>

<div class="feedback-popup" id="feedback"></div>

<!-- ===== RESULT SCREEN ===== -->
<div id="result-screen" class="screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-stars" id="result-stars"></div>
    <div class="result-stats" id="result-stats"></div>
    <div class="btn-group">
        <button class="game-btn btn-play" onclick="restartGame()">Play Again</button>
        <button class="game-btn btn-home" onclick="showThemes()">Themes</button>
        <button class="game-btn btn-home" onclick="showTitle()">Home</button>
    </div>
</div>

<script src="../shared/question-bank.js"></script>
<script src="game.js"></script>
</body>
</html>
