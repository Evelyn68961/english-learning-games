<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- John Doe: Dark cape, red/yellow menacing color scheme -->

  <!-- Cape behind body -->
  <path d="M12 50 Q50 30 88 50 L92 115 L8 115 Z" fill="#1a0a0a" opacity="0.85"/>

  <!-- Head -->
  <rect x="25" y="5" width="50" height="50" rx="5" fill="#2a1a0a"/>
  <rect x="28" y="8" width="44" height="44" rx="3" fill="#3a2010"/>

  <!-- Glowing red eyes -->
  <circle cx="40" cy="26" r="6" fill="#cc3333"/>
  <circle cx="40" cy="26" r="3" fill="#ff4444"/>
  <circle cx="40" cy="26" r="1.5" fill="#ffaaaa"/>
  <circle cx="60" cy="26" r="6" fill="#cc3333"/>
  <circle cx="60" cy="26" r="3" fill="#ff4444"/>
  <circle cx="60" cy="26" r="1.5" fill="#ffaaaa"/>

  <!-- Sinister grin -->
  <path d="M36 42 Q50 50 64 42" stroke="#FFD700" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Body - dark with red/gold accents -->
  <rect x="22" y="55" width="56" height="42" rx="4" fill="#1a0a0a"/>
  <rect x="30" y="58" width="40" height="36" rx="2" fill="#2a1a0a"/>
  <!-- Gold stripe down center -->
  <rect x="46" y="58" width="8" height="36" fill="#FFD700" opacity="0.3"/>
  <!-- Red belt -->
  <rect x="24" y="82" width="52" height="5" fill="#cc3333"/>
  <rect x="46" y="81" width="8" height="7" rx="1" fill="#FFD700"/>

  <!-- Legs -->
  <rect x="22" y="97" width="24" height="20" rx="3" fill="#0a0a0a"/>
  <rect x="54" y="97" width="24" height="20" rx="3" fill="#0a0a0a"/>

  <!-- Arms (dark) -->
  <rect x="10" y="58" width="14" height="28" rx="5" fill="#2a1a0a"/>
  <rect x="76" y="58" width="14" height="28" rx="5" fill="#2a1a0a"/>
</svg>
