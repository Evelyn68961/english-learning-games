<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Garden Defense</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green-dark: #2D5A27;
            --green-mid: #4A8C3F;
            --green-light: #7BC950;
            --brown-dark: #5C3D2E;
            --brown-mid: #8B6914;
            --sky-top: #87CEEB;
            --sky-bottom: #E0F7FA;
            --zombie-skin: #7B9A6D;
            --zombie-dark: #5A7A4D;
            --sunflower: #FFD700;
            --peashooter: #4CAF50;
            --danger: #E74C3C;
            --safe: #2ECC71;
        }

        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            background: #1a1a2e;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ===== SCREENS ===== */
        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .screen.active { display: flex; }

        /* ===== TITLE SCREEN ===== */
        #title-screen {
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 60%, var(--green-light) 60%, var(--green-mid) 100%);
        }

        .title-logo {
            font-family: 'Lilita One', cursive;
            font-size: clamp(2.2rem, 8vw, 4rem);
            color: #fff;
            text-shadow: 4px 4px 0 var(--green-dark), 0 0 20px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            animation: titleBounce 2s infinite ease-in-out;
        }

        .title-sub {
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: var(--green-dark);
            margin-bottom: 30px;
            font-weight: 700;
        }

        @keyframes titleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Title characters */
        .title-scene {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            align-items: flex-end;
        }

        .title-sunflower {
            width: 80px; height: 100px;
            position: relative;
            animation: sway 3s infinite ease-in-out;
        }

        .sunflower-head {
            width: 60px; height: 60px;
            background: var(--sunflower);
            border-radius: 50%;
            position: absolute;
            top: 0; left: 10px;
            box-shadow: inset -5px -5px 0 #E6BE00;
        }

        .sunflower-head::before {
            content: '';
            position: absolute;
            width: 30px; height: 30px;
            background: #8B4513;
            border-radius: 50%;
            top: 15px; left: 15px;
        }

        .sunflower-face {
            position: absolute;
            top: 8px; left: 12px;
            width: 36px; height: 20px;
            z-index: 2;
        }

        .sf-eye {
            width: 8px; height: 10px;
            background: #333;
            border-radius: 50%;
            display: inline-block;
            margin: 0 4px;
        }

        .sf-smile {
            width: 16px; height: 8px;
            border: 3px solid #333;
            border-top: none;
            border-radius: 0 0 10px 10px;
            margin: 2px auto 0;
        }

        .sunflower-stem {
            width: 8px; height: 50px;
            background: var(--green-mid);
            position: absolute;
            bottom: 0; left: 36px;
            border-radius: 4px;
        }

        .title-zombie {
            width: 60px; height: 90px;
            position: relative;
            animation: zombieWalk 1s infinite ease-in-out;
        }

        .zombie-head-t {
            width: 40px; height: 40px;
            background: var(--zombie-skin);
            border-radius: 8px 8px 5px 5px;
            position: absolute;
            top: 0; left: 10px;
            box-shadow: inset -3px -3px 0 var(--zombie-dark);
        }

        .zombie-eyes-t {
            position: absolute;
            top: 10px; left: 6px;
            display: flex; gap: 8px;
        }

        .z-eye-t {
            width: 10px; height: 10px;
            background: #fff;
            border-radius: 50%;
            position: relative;
        }

        .z-eye-t::after {
            content: '';
            width: 5px; height: 5px;
            background: #C0392B;
            border-radius: 50%;
            position: absolute;
            top: 3px; left: 3px;
        }

        .zombie-body-t {
            width: 35px; height: 35px;
            background: #6B4226;
            position: absolute;
            top: 38px; left: 12px;
            border-radius: 5px;
        }

        .zombie-arms-t {
            position: absolute;
            top: 40px; left: 0;
            width: 60px; height: 12px;
        }

        .z-arm-t {
            width: 18px; height: 8px;
            background: var(--zombie-skin);
            position: absolute;
            top: 0;
            border-radius: 4px;
        }

        .z-arm-t.left { left: 0; transform: rotate(15deg); }
        .z-arm-t.right { right: 0; transform: rotate(-15deg); }

        .zombie-legs-t {
            position: absolute;
            bottom: 0; left: 15px;
            display: flex; gap: 5px;
        }

        .z-leg-t {
            width: 10px; height: 18px;
            background: #555;
            border-radius: 3px;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        @keyframes zombieWalk {
            0%, 100% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-3px) rotate(-2deg); }
            75% { transform: translateX(3px) rotate(2deg); }
        }

        /* ===== THEME SELECT ===== */
        #theme-screen {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }

        .theme-title {
            font-family: 'Lilita One', cursive;
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            color: #fff;
            margin-bottom: 5px;
        }

        .theme-sub {
            color: rgba(255,255,255,0.6);
            margin-bottom: 25px;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 90%;
            padding: 0 10px;
        }

        .theme-card {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .theme-card:hover { transform: translateY(-4px); border-color: var(--sunflower); }
        .theme-card.locked { opacity: 0.4; pointer-events: none; }

        .theme-card .lock-icon {
            position: absolute;
            top: 8px; right: 8px;
            font-size: 1.2rem;
        }

        .theme-emoji { font-size: 2.5rem; margin-bottom: 8px; display: block; }
        .theme-name {
            font-family: 'Lilita One', cursive;
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: #fff;
            margin-bottom: 4px;
        }
        .theme-words {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
        }

        .back-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 700;
        }

        /* ===== MAIN GAME ===== */
        #game-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
        }

        /* ===== HUD ===== */
        .hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            z-index: 20;
            display: none;
        }

        .hud.active { display: flex; }

        .hud-item {
            color: #fff;
            font-weight: 800;
            font-size: clamp(0.85rem, 3vw, 1.1rem);
        }

        .hud-sun { color: var(--sunflower); }
        .hud-wave { color: var(--green-light); }
        .hud-lives { color: var(--danger); }

        .lives-hearts { letter-spacing: 3px; }

        /* ===== QUESTION PANEL ===== */
        .question-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 20%);
            padding: 40px 15px 25px;
            z-index: 25;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .question-panel.active { display: flex; }

        .q-prompt {
            color: #fff;
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .q-hint {
            color: rgba(255,255,255,0.5);
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            margin-bottom: 12px;
        }

        .q-image {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .q-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 500px;
        }

        .q-btn {
            padding: 12px 24px;
            border: 3px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 15px;
            font-family: 'Nunito', sans-serif;
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 100px;
        }

        .q-btn:hover { background: rgba(255,255,255,0.2); border-color: var(--sunflower); }
        .q-btn.correct { background: var(--safe); border-color: var(--safe); animation: popCorrect 0.5s; }
        .q-btn.wrong { background: var(--danger); border-color: var(--danger); animation: shake 0.5s; }

        @keyframes popCorrect {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* ===== FEEDBACK ===== */
        .feedback-popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Lilita One', cursive;
            font-size: clamp(2rem, 8vw, 3.5rem);
            color: #fff;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            z-index: 50;
            pointer-events: none;
            animation: feedbackPop 1s forwards;
            display: none;
        }

        @keyframes feedbackPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            60% { transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(0.8); }
        }

        /* ===== GAME OVER / WIN ===== */
        #result-screen {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
        }

        .result-icon { font-size: 5rem; margin-bottom: 15px; }
        .result-title {
            font-family: 'Lilita One', cursive;
            font-size: clamp(2rem, 7vw, 3rem);
            color: #fff;
            margin-bottom: 10px;
        }
        .result-stats {
            color: rgba(255,255,255,0.7);
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 25px;
            text-align: center;
            line-height: 2;
        }
        .result-stars { font-size: 2.5rem; margin-bottom: 20px; letter-spacing: 8px; }

        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

        .game-btn {
            padding: 14px 32px;
            border: none;
            border-radius: 30px;
            font-family: 'Lilita One', cursive;
            font-size: clamp(1.1rem, 3.5vw, 1.4rem);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .btn-play {
            background: linear-gradient(180deg, var(--green-light), var(--green-mid));
            color: #fff;
            box-shadow: 0 5px 0 var(--green-dark);
        }
        .btn-play:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--green-dark); }

        .btn-home {
            background: rgba(255,255,255,0.15);
            color: #fff;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
        }

        /* ===== PLAY BUTTON ===== */
        .big-play-btn {
            padding: 18px 60px;
            background: linear-gradient(180deg, var(--green-light), var(--green-mid));
            color: #fff;
            border: none;
            border-radius: 50px;
            font-family: 'Lilita One', cursive;
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            cursor: pointer;
            box-shadow: 0 7px 0 var(--green-dark), 0 12px 30px rgba(0,0,0,0.3);
            letter-spacing: 2px;
            transition: all 0.1s;
        }

        .big-play-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 var(--green-dark);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-height: 600px) {
            .title-scene { margin-bottom: 15px; }
            .theme-grid { gap: 10px; }
            .theme-card { padding: 12px 8px; }
        }
    </style>
</head>
<body>

<!-- ===== TITLE SCREEN ===== -->
<div id="title-screen" class="screen active">
    <div class="title-logo">🌻 Word Garden</div>
    <div class="title-sub">Defend your garden with English!</div>
    <div class="title-scene">
        <div class="title-sunflower">
            <div class="sunflower-head">
                <div class="sunflower-face">
                    <span class="sf-eye"></span><span class="sf-eye"></span>
                    <div class="sf-smile"></div>
                </div>
            </div>
            <div class="sunflower-stem"></div>
        </div>
        <div class="title-zombie">
            <div class="zombie-head-t">
                <div class="zombie-eyes-t">
                    <div class="z-eye-t"></div>
                    <div class="z-eye-t"></div>
                </div>
            </div>
            <div class="zombie-arms-t">
                <div class="z-arm-t left"></div>
                <div class="z-arm-t right"></div>
            </div>
            <div class="zombie-body-t"></div>
            <div class="zombie-legs-t">
                <div class="z-leg-t"></div>
                <div class="z-leg-t"></div>
            </div>
        </div>
    </div>
    <button class="big-play-btn" onclick="showThemes()">PLAY</button>
</div>

<!-- ===== THEME SELECT ===== -->
<div id="theme-screen" class="screen">
    <div class="theme-title">Pick a Theme!</div>
    <div class="theme-sub">Learn new words in each world</div>
    <div class="theme-grid" id="theme-grid"></div>
    <button class="back-btn" onclick="showTitle()">← Back</button>
</div>

<!-- ===== GAME ===== -->
<canvas id="game-canvas"></canvas>

<div class="hud" id="hud">
    <div class="hud-item hud-sun">☀️ <span id="hud-score">0</span></div>
    <div class="hud-item hud-wave">Wave <span id="hud-wave">1</span>/<span id="hud-total-waves">5</span></div>
    <div class="hud-item hud-lives"><span id="hud-lives" class="lives-hearts">❤️❤️❤️</span></div>
</div>

<div class="question-panel" id="question-panel">
    <div class="q-image" id="q-image"></div>
    <div class="q-prompt" id="q-prompt"></div>
    <div class="q-hint" id="q-hint"></div>
    <div class="q-options" id="q-options"></div>
</div>

<div class="feedback-popup" id="feedback"></div>

<!-- ===== RESULT SCREEN ===== -->
<div id="result-screen" class="screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-stars" id="result-stars"></div>
    <div class="result-stats" id="result-stats"></div>
    <div class="btn-group">
        <button class="game-btn btn-play" onclick="restartGame()">Play Again</button>
        <button class="game-btn btn-home" onclick="showThemes()">Themes</button>
        <button class="game-btn btn-home" onclick="showTitle()">Home</button>
    </div>
</div>

// ==================== CANVAS SETUP ====================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W, H, GROUND_Y, LANE_H;

function resizeCanvas() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    GROUND_Y = H * 0.55;
    LANE_H = (H - GROUND_Y - 80) / 3;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ==================== AUDIO ====================
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
    if (!audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);

        if (type === 'correct') {
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'shoot') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'zombieDie') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'plant') {
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    } catch(e) {}
}

function speakWord(text) {
    if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.85;
        u.pitch = 1.1;
        u.lang = 'en-US';
        speechSynthesis.speak(u);
    }
}

// ==================== QUESTION GENERATION ====================
function generateQuestion(theme, wave) {
    const rand = Math.random();
    const t = theme;

    // Wave 1-2: picture → word (vocab)
    if (wave <= 2 || rand < 0.35) {
        const w = t.words[Math.floor(Math.random() * t.words.length)];
        const wrongs = t.words.filter(x => x.word !== w.word)
            .sort(() => Math.random() - 0.5).slice(0, 2).map(x => x.word);
        const options = shuffle([w.word, ...wrongs]);
        return { type: 'vocab', image: w.emoji, prompt: 'What is this?', hint: w.hint, answer: w.word, options, speakText: w.word };
    }

    // Wave 3-4: fill in missing letter
    if (wave <= 4 || rand < 0.6) {
        const w = t.words[Math.floor(Math.random() * t.words.length)];
        const idx = Math.floor(Math.random() * w.word.length);
        const blanked = w.word.slice(0, idx) + '_' + w.word.slice(idx + 1);
        const correctLetter = w.word[idx];
        const allLetters = 'abcdefghijklmnopqrstuvwxyz';
        let wrongs = [];
        while (wrongs.length < 2) {
            const l = allLetters[Math.floor(Math.random() * 26)];
            if (l !== correctLetter && !wrongs.includes(l)) wrongs.push(l);
        }
        const options = shuffle([correctLetter, ...wrongs]);
        return { type: 'spelling', image: w.emoji, prompt: blanked, hint: w.hint, answer: correctLetter, options, speakText: w.word };
    }

    // Wave 5+: grammar
    if (t.grammar.length > 0) {
        const g = t.grammar[Math.floor(Math.random() * t.grammar.length)];
        return { type: 'grammar', image: '', prompt: g.sentence, hint: g.hint, answer: g.answer, options: shuffle([...g.options]), speakText: g.sentence.replace('___', g.answer) };
    }

    // Fallback: vocab
    const w = t.words[Math.floor(Math.random() * t.words.length)];
    const wrongs = t.words.filter(x => x.word !== w.word).sort(() => Math.random() - 0.5).slice(0, 2).map(x => x.word);
    return { type: 'vocab', image: w.emoji, prompt: 'What is this?', hint: w.hint, answer: w.word, options: shuffle([w.word, ...wrongs]), speakText: w.word };
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// ==================== QUESTION UI ====================
function showQuestion() {
    if (gameState.questionActive) return;
    gameState.questionActive = true;

    const q = generateQuestion(currentTheme, gameState.wave);
    gameState.currentQuestion = q;

    document.getElementById('q-image').textContent = q.image;
    document.getElementById('q-prompt').textContent = q.prompt;
    document.getElementById('q-hint').textContent = q.hint ? `💡 ${q.hint}` : '';

    const optDiv = document.getElementById('q-options');
    optDiv.innerHTML = q.options.map(o => `<button class="q-btn" onclick="answerQuestion('${o}')">${o}</button>`).join('');

    document.getElementById('question-panel').classList.add('active');

    // Speak the word
    if (q.type === 'vocab') speakWord(q.answer);
}

function answerQuestion(selected) {
    if (!gameState.questionActive) return;
    const q = gameState.currentQuestion;
    const isCorrect = selected === q.answer;
    gameState.questionsAnswered++;

    // Highlight buttons
    document.querySelectorAll('.q-btn').forEach(btn => {
        btn.style.pointerEvents = 'none';
        if (btn.textContent === q.answer) btn.classList.add('correct');
        else if (btn.textContent === selected && !isCorrect) btn.classList.add('wrong');
    });

    if (isCorrect) {
        gameState.correctAnswers++;
        gameState.score += 10;
        playSound('correct');
        showFeedback('✅ Great!');
        speakWord(q.speakText);

        // Plant a defender
        const lane = Math.floor(Math.random() * 3);
        gameState.plants.push({
            x: 80 + Math.random() * 60,
            lane: lane,
            y: GROUND_Y + lane * LANE_H + LANE_H / 2,
            type: Math.random() > 0.5 ? 'peashooter' : 'sunflower',
            shootTimer: 0,
            hp: 3,
            plantAnim: 0,
        });
        playSound('plant');
    } else {
        playSound('wrong');
        showFeedback('❌ ' + q.answer);
    }

    updateHUD();

    setTimeout(() => {
        document.getElementById('question-panel').classList.remove('active');
        gameState.questionActive = false;
    }, 1200);
}

function showFeedback(text) {
    const el = document.getElementById('feedback');
    el.textContent = text;
    el.style.display = 'block';
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = 'feedbackPop 1s forwards';
    setTimeout(() => el.style.display = 'none', 1000);
}

// ==================== HUD ====================
function updateHUD() {
    document.getElementById('hud-score').textContent = gameState.score;
    document.getElementById('hud-wave').textContent = gameState.wave;
    document.getElementById('hud-total-waves').textContent = gameState.totalWaves;
    document.getElementById('hud-lives').innerHTML = '❤️'.repeat(Math.max(0, gameState.lives)) + '🖤'.repeat(Math.max(0, 3 - gameState.lives));
}

// ==================== GAME LOOP ====================
function selectTheme(id) {
    initAudio();
    currentTheme = THEMES.find(t => t.id === id);
    startGame();
}

function startGame() {
    showScreen(''); // hide all screens
    canvas.style.display = 'block';

    gameState = {
        score: 0, lives: 3, wave: 1, totalWaves: 5,
        zombies: [], plants: [], projectiles: [],
        isPlaying: true, questionActive: false, currentQuestion: null,
        questionsAnswered: 0, correctAnswers: 0,
        zombiesPerWave: 3, zombieSpeed: 0.3,
        spawnTimer: 0, spawnInterval: 180, waveZombiesSpawned: 0,
        animFrame: null, questionCooldown: 0,
    };

    document.getElementById('hud').classList.add('active');
    updateHUD();
    resizeCanvas();
    gameLoop();

    // First question after short delay
    setTimeout(() => { if (gameState.isPlaying) showQuestion(); }, 1000);
}

function stopGame() {
    gameState.isPlaying = false;
    if (gameState.animFrame) cancelAnimationFrame(gameState.animFrame);
    document.getElementById('hud').classList.remove('active');
    document.getElementById('question-panel').classList.remove('active');
    canvas.style.display = 'none';
}

function restartGame() {
    stopGame();
    startGame();
}

function gameLoop() {
    if (!gameState.isPlaying) return;
    update();
    draw();
    gameState.animFrame = requestAnimationFrame(gameLoop);
}

function update() {
    const gs = gameState;

    // Spawn zombies
    gs.spawnTimer++;
    if (gs.spawnTimer >= gs.spawnInterval && gs.waveZombiesSpawned < gs.zombiesPerWave) {
        spawnZombie();
        gs.waveZombiesSpawned++;
        gs.spawnTimer = 0;
    }

    // Question cooldown
    if (gs.questionCooldown > 0) gs.questionCooldown--;

    // Move zombies
    gs.zombies.forEach(z => {
        if (!z.dead) {
            z.x -= gs.zombieSpeed;
            z.walkFrame = (z.walkFrame || 0) + 0.03;

            // Trigger question when zombie gets close
            if (z.x < W * 0.45 && !z.triggered && !gs.questionActive && gs.questionCooldown <= 0) {
                z.triggered = true;
                gs.questionCooldown = 90;
                showQuestion();
            }

            // Zombie reached the left edge
            if (z.x < 30) {
                z.dead = true;
                gs.lives--;
                updateHUD();
                playSound('wrong');
                if (gs.lives <= 0) endGame(false);
            }
        }
    });

    // Plants shoot
    gs.plants.forEach(p => {
        p.shootTimer++;
        p.plantAnim += 0.05;
        if (p.type === 'peashooter' && p.shootTimer > 90) {
            // Check if zombie in this lane
            const hasTarget = gs.zombies.some(z => !z.dead && z.lane === p.lane && z.x > p.x);
            if (hasTarget) {
                gs.projectiles.push({ x: p.x + 30, y: p.y, lane: p.lane, speed: 4 });
                p.shootTimer = 0;
                playSound('shoot');
            }
        }
        if (p.type === 'sunflower' && p.shootTimer > 150) {
            gs.score += 2;
            p.shootTimer = 0;
            updateHUD();
        }
    });

    // Move projectiles
    gs.projectiles.forEach(proj => {
        proj.x += proj.speed;
    });

    // Collision: projectile vs zombie
    gs.projectiles = gs.projectiles.filter(proj => {
        let hit = false;
        gs.zombies.forEach(z => {
            if (!z.dead && z.lane === proj.lane && Math.abs(z.x - proj.x) < 25) {
                z.hp--;
                hit = true;
                if (z.hp <= 0) {
                    z.dead = true;
                    gs.score += 5;
                    playSound('zombieDie');
                    updateHUD();
                }
            }
        });
        return !hit && proj.x < W + 20;
    });

    // Clean dead zombies
    gs.zombies = gs.zombies.filter(z => !z.dead || z.x > -50);

    // Wave complete check
    if (gs.waveZombiesSpawned >= gs.zombiesPerWave && gs.zombies.filter(z => !z.dead).length === 0) {
        if (gs.wave < gs.totalWaves) {
            gs.wave++;
            gs.waveZombiesSpawned = 0;
            gs.zombiesPerWave += 2;
            gs.zombieSpeed += 0.08;
            gs.spawnInterval = Math.max(80, gs.spawnInterval - 15);
            updateHUD();
            showFeedback(`🌊 Wave ${gs.wave}!`);
        } else {
            endGame(true);
        }
    }
}

function spawnZombie() {
    const lane = Math.floor(Math.random() * 3);
    gameState.zombies.push({
        x: W + 20,
        lane: lane,
        y: GROUND_Y + lane * LANE_H + LANE_H / 2,
        hp: 2 + Math.floor(gameState.wave / 2),
        dead: false,
        triggered: false,
        walkFrame: Math.random() * Math.PI * 2,
        type: Math.random() > 0.7 ? 'cone' : 'normal',
    });
}

function endGame(won) {
    gameState.isPlaying = false;
    stopGame();

    const accuracy = gameState.questionsAnswered > 0 ? Math.round(gameState.correctAnswers / gameState.questionsAnswered * 100) : 0;
    const stars = accuracy >= 90 ? 3 : accuracy >= 60 ? 2 : 1;

    document.getElementById('result-icon').textContent = won ? '🏆' : '💀';
    document.getElementById('result-title').textContent = won ? 'Garden Saved!' : 'Zombies Won!';
    document.getElementById('result-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
    document.getElementById('result-stats').innerHTML = `
        Score: ${gameState.score}<br>
        Correct: ${gameState.correctAnswers}/${gameState.questionsAnswered} (${accuracy}%)<br>
        Wave: ${gameState.wave}/${gameState.totalWaves}
    `;
    showScreen('result-screen');
}

// ==================== DRAWING ====================
function draw() {
    ctx.clearRect(0, 0, W, H);

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(1, '#B5E8F7');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // Sun
    ctx.fillStyle = '#FFE066';
    ctx.beginPath();
    ctx.arc(W - 70, 80, 35, 0, Math.PI * 2);
    ctx.fill();

    // Clouds
    drawCloud(100, 60, 0.8);
    drawCloud(W * 0.5, 40, 1);
    drawCloud(W * 0.75, 90, 0.6);

    // Ground
    const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    groundGrad.addColorStop(0, '#7BC950');
    groundGrad.addColorStop(0.3, '#5AA83A');
    groundGrad.addColorStop(1, '#3D7A28');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    // Lane lines
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    for (let i = 1; i < 3; i++) {
        const ly = GROUND_Y + i * LANE_H;
        ctx.beginPath();
        ctx.moveTo(0, ly);
        ctx.lineTo(W, ly);
        ctx.stroke();
    }

    // Fence on the left
    for (let i = 0; i < 3; i++) {
        const fy = GROUND_Y + i * LANE_H + LANE_H / 2;
        ctx.fillStyle = '#8B6914';
        ctx.fillRect(10, fy - 20, 8, 40);
        ctx.fillRect(22, fy - 25, 8, 50);
        ctx.fillRect(10, fy - 5, 20, 6);
    }

    // Plants
    gameState.plants.forEach(p => drawPlant(p));

    // Projectiles
    gameState.projectiles.forEach(proj => {
        ctx.fillStyle = '#4CAF50';
        ctx.beginPath();
        ctx.arc(proj.x, proj.y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#388E3C';
        ctx.beginPath();
        ctx.arc(proj.x, proj.y, 3, 0, Math.PI * 2);
        ctx.fill();
    });

    // Zombies
    gameState.zombies.forEach(z => { if (!z.dead) drawZombie(z); });
}

function drawCloud(x, y, scale) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(x, y, 20 * scale, 0, Math.PI * 2);
    ctx.arc(x + 20 * scale, y - 10 * scale, 25 * scale, 0, Math.PI * 2);
    ctx.arc(x + 45 * scale, y, 20 * scale, 0, Math.PI * 2);
    ctx.fill();
}

function drawPlant(p) {
    const x = p.x, y = p.y;
    const bob = Math.sin(p.plantAnim) * 3;

    if (p.type === 'peashooter') {
        // Stem
        ctx.fillStyle = '#388E3C';
        ctx.fillRect(x - 3, y - 5, 6, 25);
        // Head
        ctx.fillStyle = '#4CAF50';
        ctx.beginPath();
        ctx.arc(x, y - 10 + bob, 16, 0, Math.PI * 2);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x - 5, y - 13 + bob, 5, 0, Math.PI * 2);
        ctx.arc(x + 5, y - 13 + bob, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(x - 4, y - 13 + bob, 2.5, 0, Math.PI * 2);
        ctx.arc(x + 6, y - 13 + bob, 2.5, 0, Math.PI * 2);
        ctx.fill();
        // Mouth (tube)
        ctx.fillStyle = '#2E7D32';
        ctx.fillRect(x + 10, y - 8 + bob, 12, 6);
        ctx.beginPath();
        ctx.arc(x + 22, y - 5 + bob, 4, 0, Math.PI * 2);
        ctx.fill();
    } else {
        // Sunflower
        // Stem
        ctx.fillStyle = '#388E3C';
        ctx.fillRect(x - 3, y - 5, 6, 25);
        // Petals
        const petals = 8;
        for (let i = 0; i < petals; i++) {
            const angle = (i / petals) * Math.PI * 2 + p.plantAnim * 0.3;
            const px = x + Math.cos(angle) * 14;
            const py = (y - 12 + bob) + Math.sin(angle) * 14;
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(px, py, 8, 5, angle, 0, Math.PI * 2);
            ctx.fill();
        }
        // Center
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.arc(x, y - 12 + bob, 10, 0, Math.PI * 2);
        ctx.fill();
        // Face
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(x - 3, y - 14 + bob, 2, 0, Math.PI * 2);
        ctx.arc(x + 3, y - 14 + bob, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x, y - 10 + bob, 4, 0, Math.PI);
        ctx.stroke();
    }
}

function drawZombie(z) {
    const x = z.x, y = z.y;
    const wobble = Math.sin(z.walkFrame * 3) * 3;
    const legOffset = Math.sin(z.walkFrame * 6) * 5;

    // Legs
    ctx.fillStyle = '#555';
    ctx.fillRect(x - 8, y + 8, 7, 18 + legOffset);
    ctx.fillRect(x + 2, y + 8, 7, 18 - legOffset);

    // Body
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(x - 10, y - 12 + wobble, 22, 22);
    // Tie / detail
    ctx.fillStyle = '#8B0000';
    ctx.fillRect(x - 1, y - 10 + wobble, 4, 15);

    // Arms (reaching forward)
    ctx.fillStyle = '#7B9A6D';
    ctx.save();
    ctx.translate(x - 12, y - 5 + wobble);
    ctx.rotate(-0.5 + Math.sin(z.walkFrame * 4) * 0.15);
    ctx.fillRect(0, 0, -22, 7);
    ctx.restore();
    ctx.save();
    ctx.translate(x + 12, y - 5 + wobble);
    ctx.rotate(0.5 - Math.sin(z.walkFrame * 4) * 0.15);
    ctx.fillRect(0, 0, 22, 7);
    ctx.restore();

    // Head
    ctx.fillStyle = '#7B9A6D';
    ctx.beginPath();
    ctx.roundRect(x - 12, y - 32 + wobble, 26, 22, 6);
    ctx.fill();

    // Cone hat
    if (z.type === 'cone') {
        ctx.fillStyle = '#FF8C00';
        ctx.beginPath();
        ctx.moveTo(x - 8, y - 30 + wobble);
        ctx.lineTo(x + 1, y - 52 + wobble);
        ctx.lineTo(x + 10, y - 30 + wobble);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#E67E22';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x - 6, y - 35 + wobble);
        ctx.lineTo(x + 8, y - 35 + wobble);
        ctx.stroke();
    }

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x - 4, y - 24 + wobble, 5, 0, Math.PI * 2);
    ctx.arc(x + 6, y - 24 + wobble, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#C0392B';
    ctx.beginPath();
    ctx.arc(x - 3, y - 24 + wobble, 2.5, 0, Math.PI * 2);
    ctx.arc(x + 7, y - 24 + wobble, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Mouth
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - 4, y - 16 + wobble);
    ctx.lineTo(x + 6, y - 17 + wobble);
    ctx.stroke();

    // HP bar
    const maxHp = 2 + Math.floor(gameState.wave / 2);
    const hpW = 30;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(x - hpW/2, y - 38 + wobble, hpW, 4);
    ctx.fillStyle = z.hp > maxHp * 0.5 ? '#2ECC71' : '#E74C3C';
    ctx.fillRect(x - hpW/2, y - 38 + wobble, hpW * (z.hp / maxHp), 4);
}

// ==================== INIT ====================
renderThemes();
</script>
