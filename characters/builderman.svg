<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Builderman: Orange hard hat, dark skin, builder/construction outfit -->

  <!-- Hard hat -->
  <rect x="24" y="-2" width="52" height="14" rx="6" fill="#ff8c00"/>
  <rect x="20" y="8" width="60" height="6" rx="2" fill="#ff9f20"/>
  <!-- Hat brim -->
  <rect x="18" y="12" width="64" height="4" rx="2" fill="#e07800"/>

  <!-- Head -->
  <rect x="25" y="14" width="50" height="44" rx="5" fill="#8B5E3C"/>
  <rect x="28" y="17" width="44" height="38" rx="3" fill="#A0704C"/>

  <!-- Eyes -->
  <circle cx="40" cy="30" r="6" fill="white"/>
  <circle cx="40" cy="31" r="3.5" fill="#2C2C2C"/>
  <circle cx="60" cy="30" r="6" fill="white"/>
  <circle cx="60" cy="31" r="3.5" fill="#2C2C2C"/>

  <!-- Big friendly smile -->
  <path d="M38 44 Q50 54 62 44" stroke="#5a3a20" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Body - green work outfit -->
  <rect x="22" y="58" width="56" height="40" rx="4" fill="#2a6e2a"/>
  <rect x="28" y="61" width="44" height="34" rx="2" fill="#338833"/>
  <!-- Pocket -->
  <rect x="34" y="64" width="14" height="10" rx="2" fill="#1a5a1a"/>
  <rect x="52" y="64" width="14" height="10" rx="2" fill="#1a5a1a"/>
  <!-- Tool belt -->
  <rect x="24" y="86" width="52" height="5" fill="#5a4a2a"/>
  <rect x="30" y="85" width="6" height="7" rx="1" fill="#c0c0c0"/>
  <rect x="64" y="85" width="6" height="7" rx="1" fill="#c0c0c0"/>

  <!-- Legs -->
  <rect x="22" y="98" width="24" height="20" rx="3" fill="#1a5a1a"/>
  <rect x="54" y="98" width="24" height="20" rx="3" fill="#1a5a1a"/>
  <!-- Boots -->
  <rect x="20" y="112" width="28" height="8" rx="3" fill="#5a4a2a"/>
  <rect x="52" y="112" width="28" height="8" rx="3" fill="#5a4a2a"/>

  <!-- Arms (skin tone) -->
  <rect x="10" y="60" width="14" height="28" rx="5" fill="#A0704C"/>
  <rect x="76" y="60" width="14" height="28" rx="5" fill="#A0704C"/>
</svg>
