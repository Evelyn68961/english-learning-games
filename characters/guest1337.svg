  <rect x="26" y="62" width="14" height="10" rx="2" fill="#8a9a6a"/>
  <rect x="42" y="60" width="12" height="8" rx="1" fill="#5a6a4a"/>
  <rect x="58" y="64" width="16" height="12" rx="2" fill="#7a8a5a"/>
  <rect x="28" y="76" width="18" height="8" rx="1" fill="#5a6a4a"/>
  <rect x="50" y="78" width="14" height="10" rx="2" fill="#8a9a6a"/>
  <rect x="34" y="86" width="12" height="8" rx="1" fill="#6b7a5a"/>
  <rect x="56" y="62" width="8" height="6" rx="1" fill="#9aaa7a"/>
  <!-- Tan/beige chest panel -->
  <rect x="36" y="60" width="28" height="16" rx="2" fill="#c4b090"/>
  <rect x="40" y="62" width="20" height="12" rx="1" fill="#b8a480"/>
  <!-- White stripe details on vest -->
  <rect x="22" y="88" width="56" height="3" fill="#d0d0d0"/>

  <!-- Legs - brown/tan -->
  <rect x="22" y="98" width="24" height="20" rx="3" fill="#7a6a50"/>
  <rect x="54" y="98" width="24" height="20" rx="3" fill="#7a6a50"/>
  <!-- Boot detail -->
  <rect x="22" y="112" width="24" height="6" rx="2" fill="#5a4a3a"/>
  <rect x="54" y="112" width="24" height="6" rx="2" fill="#5a4a3a"/>

