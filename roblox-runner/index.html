<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Runner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@600;700;800&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Nunito',sans-serif;overflow:hidden;background:#1a1a2e;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
        .screen{position:fixed;top:0;left:0;width:100vw;height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
        .screen.active{display:flex;}

        #title-screen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);overflow:hidden;}
        .title-bg-blocks{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
        .bg-block{position:absolute;border-radius:4px;opacity:0.15;animation:floatBlock 8s infinite ease-in-out;}
        @keyframes floatBlock{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-30px) rotate(15deg);}}
        .title-text{font-family:'Bungee',cursive;font-size:clamp(2.5rem,9vw,4.5rem);color:#fff;text-shadow:4px 4px 0 rgba(0,0,0,0.3);z-index:2;margin-bottom:5px;}
        .title-sub-text{font-size:clamp(1rem,3vw,1.4rem);color:rgba(255,255,255,0.8);z-index:2;margin-bottom:20px;font-weight:700;}
        .title-instructions{z-index:2;background:rgba(255,255,255,0.1);border-radius:16px;padding:15px 25px;margin-bottom:25px;max-width:340px;text-align:center;}
        .title-instructions p{color:rgba(255,255,255,0.85);font-size:clamp(0.85rem,2.5vw,1rem);margin:6px 0;font-weight:700;}
        .title-character{width:80px;height:110px;position:relative;z-index:2;margin-bottom:20px;animation:charBounce 1s infinite ease-in-out;}
        @keyframes charBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
        .char-head{width:40px;height:40px;background:#FFD93D;border-radius:6px;position:absolute;top:0;left:20px;box-shadow:inset -4px -4px 0 #E6BE00;}
        .char-face{position:absolute;top:10px;left:5px;width:30px;height:20px;}
        .char-eye{width:7px;height:9px;background:#333;border-radius:2px;display:inline-block;margin:0 3px;}
        .char-mouth{width:14px;height:5px;border:2px solid #333;border-top:none;border-radius:0 0 8px 8px;margin:3px auto 0;}
        .char-body{width:35px;height:30px;background:#4ECDC4;border-radius:4px;position:absolute;top:38px;left:22px;box-shadow:inset -3px -3px 0 #3BA99C;}
        .char-arm{width:10px;height:25px;background:#FFD93D;border-radius:3px;position:absolute;top:40px;}
        .char-arm.left{left:12px;}.char-arm.right{right:12px;}
        .char-leg{width:12px;height:25px;background:#4A628A;border-radius:3px;position:absolute;bottom:0;}
        .char-leg.left{left:24px;}.char-leg.right{right:24px;}
        .big-play{padding:18px 60px;background:linear-gradient(180deg,#FFD93D,#F0C419);color:#333;border:none;border-radius:12px;font-family:'Bungee',cursive;font-size:clamp(1.5rem,5vw,2rem);cursor:pointer;box-shadow:0 6px 0 #C9A30E,0 10px 25px rgba(0,0,0,0.3);z-index:2;transition:all 0.1s;}
        .big-play:active{transform:translateY(4px);box-shadow:0 2px 0 #C9A30E;}

        #theme-screen{background:linear-gradient(180deg,#16213e,#1a1a2e);}
        .theme-title{font-family:'Bungee',cursive;font-size:clamp(1.8rem,6vw,2.8rem);color:#FFD93D;margin-bottom:5px;}
        .theme-sub{color:rgba(255,255,255,0.5);margin-bottom:25px;font-size:clamp(0.85rem,2.5vw,1.1rem);}
        .theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:480px;width:90%;}
        .theme-card{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:all 0.3s;}
        .theme-card:hover{transform:translateY(-3px);border-color:#FFD93D;background:rgba(255,215,61,0.08);}
        .theme-emoji{font-size:2.2rem;margin-bottom:6px;display:block;}
        .theme-name{font-family:'Bungee',cursive;font-size:clamp(0.9rem,3vw,1.2rem);color:#fff;}
        .theme-preview{font-size:0.7rem;color:rgba(255,255,255,0.4);margin-top:4px;}
        .back-btn{margin-top:20px;padding:10px 28px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:none;border-radius:20px;font-family:'Nunito',sans-serif;font-size:0.95rem;cursor:pointer;font-weight:700;}

        #game-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:none;cursor:pointer;}
        .hud{position:fixed;top:0;left:0;right:0;display:none;justify-content:space-between;align-items:center;padding:8px 15px;background:rgba(0,0,0,0.4);backdrop-filter:blur(5px);z-index:20;}
        .hud.active{display:flex;}
        .hud-item{color:#fff;font-weight:800;font-size:clamp(0.85rem,3vw,1.1rem);}
        .hud-coins{color:#FFD93D;}.hud-dist{color:#4ECDC4;}.hud-lives{color:#FF6B6B;}

        /* Question bar - compact, doesn't block gameplay */
        .q-bar{position:fixed;top:46px;left:10px;right:10px;display:none;flex-direction:column;align-items:center;z-index:22;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);border-radius:16px;padding:10px 12px 12px;pointer-events:auto;}
        .q-bar.active{display:flex;}
        .q-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
        .q-bar-emoji{font-size:1.8rem;}
        .q-bar-prompt{font-family:'Bungee',cursive;color:#fff;font-size:clamp(0.95rem,3.2vw,1.3rem);text-shadow:0 2px 4px rgba(0,0,0,0.4);}
        .q-bar-hint{color:rgba(255,255,255,0.4);font-size:clamp(0.7rem,2vw,0.85rem);margin-bottom:6px;}
        .q-bar-options{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
        .q-btn{padding:9px 20px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);color:#fff;border-radius:10px;font-family:'Bungee',cursive;font-size:clamp(0.9rem,3vw,1.15rem);cursor:pointer;transition:all 0.15s;min-width:75px;}
        .q-btn:hover{background:rgba(255,255,255,0.2);border-color:#FFD93D;}
        .q-btn.correct{background:#2ECC71;border-color:#27AE60;animation:pop 0.4s;}
        .q-btn.wrong{background:#E74C3C;border-color:#C0392B;animation:shake 0.4s;}
        @keyframes pop{50%{transform:scale(1.1);}}
        @keyframes shake{25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

        .feedback{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Bungee',cursive;font-size:clamp(1.8rem,7vw,3rem);color:#fff;text-shadow:0 4px 8px rgba(0,0,0,0.5);z-index:50;pointer-events:none;display:none;}
        @keyframes fbPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}100%{opacity:0;transform:translate(-50%,-70%) scale(0.8);}}

        #result-screen{background:rgba(0,0,0,0.88);backdrop-filter:blur(10px);}
        .result-icon{font-size:5rem;margin-bottom:10px;}
        .result-title{font-family:'Bungee',cursive;font-size:clamp(2rem,7vw,3rem);color:#FFD93D;margin-bottom:10px;}
        .result-stars{font-size:2.5rem;letter-spacing:8px;margin-bottom:15px;}
        .result-stats{color:rgba(255,255,255,0.7);font-size:clamp(0.95rem,3vw,1.15rem);text-align:center;line-height:2;margin-bottom:25px;}
        .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
        .game-btn{padding:14px 30px;border:none;border-radius:12px;font-family:'Bungee',cursive;font-size:clamp(1rem,3.5vw,1.3rem);cursor:pointer;}
        .btn-retry{background:linear-gradient(180deg,#FFD93D,#F0C419);color:#333;box-shadow:0 5px 0 #C9A30E;}
        .btn-retry:active{transform:translateY(3px);box-shadow:0 2px 0 #C9A30E;}
        .btn-back{background:rgba(255,255,255,0.12);color:#fff;box-shadow:0 5px 0 rgba(0,0,0,0.2);}
    </style>
</head>
<body>

<div id="title-screen" class="screen active">
    <div class="title-bg-blocks" id="bg-blocks"></div>
    <div class="title-text">WORD RUNNER</div>
    <div class="title-sub-text">Run, Learn, Collect!</div>
    <div class="title-character">
        <div class="char-head"><div class="char-face"><span class="char-eye"></span><span class="char-eye"></span><div class="char-mouth"></div></div></div>
        <div class="char-arm left"></div><div class="char-arm right"></div>
        <div class="char-body"></div>
        <div class="char-leg left"></div><div class="char-leg right"></div>
    </div>
    <div class="title-instructions">
        <p>👆 TAP / SPACE to jump!</p>
        <p>🪨 Answer right → get a SHIELD!</p>
        <p>🪙 Answer right → unlock COINS!</p>
        <p>❌ Wrong? Jump on your own!</p>
    </div>
    <button class="big-play" onclick="showThemes()">RUN!</button>
</div>

<div id="theme-screen" class="screen">
    <div class="theme-title">PICK YOUR WORLD</div>
    <div class="theme-sub">Each world teaches different words</div>
    <div class="theme-grid" id="theme-grid"></div>
    <button class="back-btn" onclick="showTitle()">← Back</button>
</div>

<canvas id="game-canvas"></canvas>

<div class="hud" id="hud">
    <div class="hud-item hud-coins">🪙 <span id="hud-coins">0</span></div>
    <div class="hud-item hud-dist">📏 <span id="hud-dist">0</span>m</div>
    <div class="hud-item hud-lives"><span id="hud-lives">❤️❤️❤️</span></div>
</div>

<div class="q-bar" id="q-bar">
    <div class="q-bar-row">
        <div class="q-bar-emoji" id="q-emoji"></div>
        <div class="q-bar-prompt" id="q-prompt"></div>
    </div>
    <div class="q-bar-hint" id="q-hint"></div>
    <div class="q-bar-options" id="q-options"></div>
</div>

<div class="feedback" id="feedback"></div>

<div id="result-screen" class="screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-stars" id="result-stars"></div>
    <div class="result-stats" id="result-stats"></div>
    <div class="btn-row">
        <button class="game-btn btn-retry" onclick="restartGame()">Run Again</button>
        <button class="game-btn btn-back" onclick="showThemes()">Worlds</button>
        <button class="game-btn btn-back" onclick="showTitle()">Home</button>
    </div>
</div>

<script>
const THEMES=[
{id:'animals',name:'Animal World',emoji:'🐾',bg1:'#87CEEB',bg2:'#228B22',ground:'#4A7C3F',
words:[{word:'cat',emoji:'🐱',hint:'貓'},{word:'dog',emoji:'🐶',hint:'狗'},{word:'fish',emoji:'🐟',hint:'魚'},{word:'bird',emoji:'🐦',hint:'鳥'},{word:'bear',emoji:'🐻',hint:'熊'},{word:'frog',emoji:'🐸',hint:'青蛙'},{word:'duck',emoji:'🦆',hint:'鴨子'},{word:'pig',emoji:'🐷',hint:'豬'},{word:'cow',emoji:'🐮',hint:'牛'},{word:'rabbit',emoji:'🐰',hint:'兔子'}],
grammar:[{sentence:'A cat ___ small.',answer:'is',options:['is','are','am'],hint:'貓很小'},{sentence:'Dogs ___ friendly.',answer:'are',options:['is','are','am'],hint:'狗很友善'},{sentence:'I ___ a bird.',answer:'see',options:['see','sees','look'],hint:'我看到一隻鳥'},{sentence:'The fish ___ fast.',answer:'swims',options:['swim','swims','run'],hint:'魚游得很快'}],
obstacles:['🪨','🌳','🪵'],scenery:['🌲','🌿','🌺','🍄']},
{id:'food',name:'Food Land',emoji:'🍎',bg1:'#FFB347',bg2:'#D35400',ground:'#C0834A',
words:[{word:'apple',emoji:'🍎',hint:'蘋果'},{word:'rice',emoji:'🍚',hint:'飯'},{word:'milk',emoji:'🥛',hint:'牛奶'},{word:'egg',emoji:'🥚',hint:'蛋'},{word:'bread',emoji:'🍞',hint:'麵包'},{word:'cake',emoji:'🎂',hint:'蛋糕'},{word:'candy',emoji:'🍬',hint:'糖果'},{word:'water',emoji:'💧',hint:'水'},{word:'juice',emoji:'🧃',hint:'果汁'},{word:'pizza',emoji:'🍕',hint:'披薩'}],
grammar:[{sentence:'I like ___.',answer:'apples',options:['apple','apples','a apple'],hint:'我喜歡蘋果'},{sentence:'She ___ rice.',answer:'eats',options:['eat','eats','eating'],hint:'她吃飯'},{sentence:'The cake ___ sweet.',answer:'is',options:['is','are','am'],hint:'蛋糕很甜'},{sentence:'I want ___ milk.',answer:'some',options:['a','some','many'],hint:'我想要一些牛奶'}],
obstacles:['🧁','🍩','🎂'],scenery:['🍭','🍦','🧁','🍪']},
{id:'colors',name:'Rainbow Road',emoji:'🌈',bg1:'#9B59B6',bg2:'#8E44AD',ground:'#7D3C98',
words:[{word:'red',emoji:'🔴',hint:'紅色'},{word:'blue',emoji:'🔵',hint:'藍色'},{word:'green',emoji:'🟢',hint:'綠色'},{word:'yellow',emoji:'🟡',hint:'黃色'},{word:'pink',emoji:'🩷',hint:'粉紅色'},{word:'black',emoji:'⚫',hint:'黑色'},{word:'white',emoji:'⚪',hint:'白色'},{word:'orange',emoji:'🟠',hint:'橘色'},{word:'purple',emoji:'🟣',hint:'紫色'},{word:'brown',emoji:'🟤',hint:'棕色'}],
grammar:[{sentence:'The sky ___ blue.',answer:'is',options:['is','are','am'],hint:'天空是藍色的'},{sentence:'Apples ___ red.',answer:'are',options:['is','are','am'],hint:'蘋果是紅色的'},{sentence:'What color ___ it?',answer:'is',options:['is','are','do'],hint:'它是什麼顏色？'},{sentence:'My bag is ___.',answer:'black',options:['a black','black','blacks'],hint:'我的包包是黑色的'}],
obstacles:['💎','🔮','🧊'],scenery:['🌈','✨','⭐','🎆']},
{id:'family',name:'Family Town',emoji:'👨‍👩‍👦',bg1:'#5DADE2',bg2:'#2471A3',ground:'#5B7BB4',
words:[{word:'mom',emoji:'👩',hint:'媽媽'},{word:'dad',emoji:'👨',hint:'爸爸'},{word:'sister',emoji:'👧',hint:'姊妹'},{word:'brother',emoji:'👦',hint:'兄弟'},{word:'baby',emoji:'👶',hint:'寶寶'},{word:'grandma',emoji:'👵',hint:'奶奶'},{word:'grandpa',emoji:'👴',hint:'爺爺'},{word:'family',emoji:'👨‍👩‍👧‍👦',hint:'家人'},{word:'friend',emoji:'🤝',hint:'朋友'},{word:'teacher',emoji:'👩‍🏫',hint:'老師'}],
grammar:[{sentence:'She ___ my mom.',answer:'is',options:['is','are','am'],hint:'她是我媽媽'},{sentence:'I love ___ dad.',answer:'my',options:['my','me','I'],hint:'我愛我爸爸'},{sentence:'___ is your friend?',answer:'Who',options:['Who','What','Where'],hint:'誰是你的朋友？'},{sentence:'They ___ my family.',answer:'are',options:['is','are','am'],hint:'他們是我的家人'}],
obstacles:['🏠','🏡','🧱'],scenery:['🏠','🌳','🏡','🌻']},
{id:'school',name:'School Zone',emoji:'🏫',bg1:'#58D68D',bg2:'#28B463',ground:'#3D9140',
words:[{word:'book',emoji:'📖',hint:'書'},{word:'pen',emoji:'🖊️',hint:'筆'},{word:'desk',emoji:'🪑',hint:'書桌'},{word:'bag',emoji:'🎒',hint:'書包'},{word:'ruler',emoji:'📏',hint:'尺'},{word:'eraser',emoji:'🧽',hint:'橡皮擦'},{word:'paper',emoji:'📄',hint:'紙'},{word:'pencil',emoji:'✏️',hint:'鉛筆'},{word:'clock',emoji:'🕐',hint:'時鐘'},{word:'map',emoji:'🗺️',hint:'地圖'}],
grammar:[{sentence:'This ___ a book.',answer:'is',options:['is','are','am'],hint:'這是一本書'},{sentence:'I have ___ pen.',answer:'a',options:['a','an','the'],hint:'我有一支筆'},{sentence:'There ___ two desks.',answer:'are',options:['is','are','am'],hint:'有兩張桌子'},{sentence:'I ___ a student.',answer:'am',options:['is','are','am'],hint:'我是學生'}],
obstacles:['📚','🎒','📦'],scenery:['🏫','📖','✏️','🌳']},
{id:'feelings',name:'Mood Mountain',emoji:'😊',bg1:'#F39C12',bg2:'#E67E22',ground:'#B8860B',
words:[{word:'happy',emoji:'😊',hint:'開心'},{word:'sad',emoji:'😢',hint:'傷心'},{word:'angry',emoji:'😠',hint:'生氣'},{word:'tired',emoji:'😴',hint:'累'},{word:'hungry',emoji:'🤤',hint:'餓'},{word:'scared',emoji:'😨',hint:'害怕'},{word:'brave',emoji:'💪',hint:'勇敢'},{word:'hot',emoji:'🥵',hint:'熱'},{word:'cold',emoji:'🥶',hint:'冷'},{word:'sleepy',emoji:'😪',hint:'想睡'}],
grammar:[{sentence:'I ___ happy.',answer:'am',options:['is','are','am'],hint:'我很開心'},{sentence:'She ___ tired.',answer:'is',options:['is','are','am'],hint:'她很累'},{sentence:'Are you ___?',answer:'hungry',options:['hunger','hungry','hungries'],hint:'你餓了嗎？'},{sentence:'He feels ___.',answer:'cold',options:['cold','colds','coldy'],hint:'他覺得冷'}],
obstacles:['🌋','⛰️','🪨'],scenery:['⛰️','🌤️','🏔️','🌵']}
];

let currentTheme=null,gs={};
const canvas=document.getElementById('game-canvas'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playSound(t){if(!audioCtx)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);g.gain.setValueAtTime(0.12,audioCtx.currentTime);
if(t==='correct'){o.frequency.setValueAtTime(523,audioCtx.currentTime);o.frequency.setValueAtTime(659,audioCtx.currentTime+.08);o.frequency.setValueAtTime(784,audioCtx.currentTime+.16);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.35);o.start();o.stop(audioCtx.currentTime+.35);}
else if(t==='wrong'){o.type='sawtooth';o.frequency.setValueAtTime(250,audioCtx.currentTime);o.frequency.linearRampToValueAtTime(120,audioCtx.currentTime+.25);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.25);o.start();o.stop(audioCtx.currentTime+.25);}
else if(t==='coin'){o.frequency.setValueAtTime(988,audioCtx.currentTime);o.frequency.setValueAtTime(1319,audioCtx.currentTime+.06);g.gain.setValueAtTime(.08,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.15);o.start();o.stop(audioCtx.currentTime+.15);}
else if(t==='jump'){o.frequency.setValueAtTime(300,audioCtx.currentTime);o.frequency.linearRampToValueAtTime(700,audioCtx.currentTime+.12);g.gain.setValueAtTime(.1,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.15);o.start();o.stop(audioCtx.currentTime+.15);}
else if(t==='hit'){o.type='square';o.frequency.setValueAtTime(150,audioCtx.currentTime);g.gain.setValueAtTime(.15,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.2);o.start();o.stop(audioCtx.currentTime+.2);}
else if(t==='shield'){o.frequency.setValueAtTime(600,audioCtx.currentTime);o.frequency.setValueAtTime(800,audioCtx.currentTime+.1);o.frequency.setValueAtTime(1000,audioCtx.currentTime+.2);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.35);o.start();o.stop(audioCtx.currentTime+.35);}
}catch(e){}}
function speakWord(t){if('speechSynthesis'in window){const u=new SpeechSynthesisUtterance(t);u.rate=.85;u.pitch=1.1;u.lang='en-US';speechSynthesis.speak(u);}}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));if(id)document.getElementById(id)?.classList.add('active');}
function showTitle(){stopGame();showScreen('title-screen');}
function showThemes(){stopGame();document.getElementById('theme-grid').innerHTML=THEMES.map(t=>`<div class="theme-card" onclick="selectTheme('${t.id}')"><span class="theme-emoji">${t.emoji}</span><div class="theme-name">${t.name}</div><div class="theme-preview">${t.words.slice(0,4).map(w=>w.word).join(', ')}</div></div>`).join('');showScreen('theme-screen');}
(function(){const c=document.getElementById('bg-blocks'),cols=['#FF6B6B','#4ECDC4','#FFD93D','#95E1D3','#FF8A5C','#A8E6CF'];for(let i=0;i<15;i++){const d=document.createElement('div');d.className='bg-block';d.style.width=d.style.height=(20+Math.random()*40)+'px';d.style.background=cols[Math.floor(Math.random()*cols.length)];d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';d.style.animationDelay=-Math.random()*8+'s';d.style.animationDuration=(6+Math.random()*6)+'s';c.appendChild(d);}})();

function selectTheme(id){initAudio();currentTheme=THEMES.find(t=>t.id===id);startGame();}

function startGame(){
    showScreen('');canvas.style.display='block';document.getElementById('hud').classList.add('active');
    resize();const groundY=H*0.75;
    gs={running:true,speed:3,maxSpeed:6.5,distance:0,coins:0,lives:3,
        correct:0,total:0,questionNum:0,questionsToWin:12,
        px:W*0.15,py:groundY,groundY,vy:0,jumping:false,runFrame:0,
        invincible:0,shield:0, // shield frames remaining (smash through obstacles)
        bgScrollX:0,obstacles:[],coinGroups:[],coinItems:[],
        sceneryItems:[],groundDashes:[],dustParticles:[],particles:[],
        qActive:false,currentQ:null,qTarget:null,qType:null,
        // Spawning
        nextSpawnX:W+200, spawnType:'obstacle',
        frame:null,shakeTimer:0,flashTimer:0};
    for(let i=0;i<30;i++)gs.groundDashes.push({x:Math.random()*W,y:groundY+5+Math.random()*(H-groundY-15)});
    for(let i=0;i<5;i++)gs.sceneryItems.push({x:W*0.3+i*(W*0.25),emoji:currentTheme.scenery[Math.floor(Math.random()*currentTheme.scenery.length)],y:groundY-15-Math.random()*30,scale:0.7+Math.random()*0.5,depth:0.3+Math.random()*0.4});
    updateHUD();loop();
}
function stopGame(){gs.running=false;if(gs.frame)cancelAnimationFrame(gs.frame);canvas.style.display='none';document.getElementById('hud').classList.remove('active');document.getElementById('q-bar').classList.remove('active');}
function restartGame(){stopGame();startGame();}

// ===== INPUT - player always controls jump =====
function doJump(){
    if(!gs.running||gs.jumping)return;
    gs.jumping=true;gs.vy=-13.5;playSound('jump');
    for(let i=0;i<6;i++)gs.dustParticles.push({x:gs.px-5+Math.random()*10,y:gs.groundY,vx:-1-Math.random()*2,vy:-Math.random()*2,life:20+Math.random()*15,maxLife:35,size:3+Math.random()*4});
}
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doJump();}});
canvas.addEventListener('click',doJump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});

// ===== SPAWNING =====
function spawnNext(){
    if(gs.questionNum>=gs.questionsToWin)return;
    const x=gs.nextSpawnX;
    if(gs.spawnType==='obstacle'){
        const emoji=currentTheme.obstacles[Math.floor(Math.random()*currentTheme.obstacles.length)];
        gs.obstacles.push({x,y:gs.groundY,w:40,h:40,emoji,triggered:false,passed:false,smashed:false});
        gs.spawnType='coins';
    } else {
        const coins=[];const baseY=gs.groundY;
        if(Math.random()<0.5){for(let i=0;i<5;i++)coins.push({x:x+i*32,y:baseY-22,bob:Math.random()*Math.PI*2,collected:false,locked:true});}
        else{for(let i=0;i<5;i++){const t=i/4;coins.push({x:x+i*30,y:baseY-30-Math.sin(t*Math.PI)*65,bob:Math.random()*Math.PI*2,collected:false,locked:true});}}
        gs.coinItems.push(...coins);
        gs.coinGroups.push({coins,triggered:false});
        gs.spawnType='obstacle';
    }
    gs.nextSpawnX=x+W*0.55+Math.random()*100;
}

// ===== QUESTIONS =====
function generateQ(){
    const t=currentTheme,n=gs.questionNum,r=Math.random();
    if(n<4||r<0.35){const w=t.words[Math.floor(Math.random()*t.words.length)];const wr=t.words.filter(x=>x.word!==w.word).sort(()=>Math.random()-0.5).slice(0,2).map(x=>x.word);return{image:w.emoji,prompt:'What is this?',hint:w.hint,answer:w.word,options:shuffle([w.word,...wr]),speak:w.word};}
    if(n<8||r<0.6){const w=t.words[Math.floor(Math.random()*t.words.length)];const idx=Math.floor(Math.random()*w.word.length);const blanked=w.word.slice(0,idx)+'_'+w.word.slice(idx+1);const correct=w.word[idx];let wr=[];while(wr.length<2){const l='abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random()*26)];if(l!==correct&&!wr.includes(l))wr.push(l);}return{image:w.emoji,prompt:blanked,hint:w.hint,answer:correct,options:shuffle([correct,...wr]),speak:w.word};}
    if(t.grammar.length){const g=t.grammar[Math.floor(Math.random()*t.grammar.length)];return{image:'',prompt:g.sentence,hint:g.hint,answer:g.answer,options:shuffle([...g.options]),speak:g.sentence.replace('___',g.answer)};}
    const w=t.words[0];return{image:w.emoji,prompt:'What is this?',hint:w.hint,answer:w.word,options:shuffle([w.word,t.words[1].word,t.words[2].word]),speak:w.word};
}

function showQ(type,target){
    if(gs.qActive)return;
    gs.qActive=true;gs.qType=type;gs.qTarget=target;
    const q=generateQ();gs.currentQ=q;
    document.getElementById('q-emoji').textContent=q.image;
    document.getElementById('q-prompt').textContent=q.prompt;
    document.getElementById('q-hint').textContent=q.hint?'💡 '+q.hint:'';
    document.getElementById('q-options').innerHTML=q.options.map(o=>`<button class="q-btn" onclick="answerQ(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('');
    document.getElementById('q-bar').classList.add('active');
    if(q.image)speakWord(q.answer);
}

function answerQ(btnEl,sel){
    if(!gs.qActive)return;
    const q=gs.currentQ,correct=sel===q.answer;
    gs.total++;gs.questionNum++;
    // Disable buttons
    document.querySelectorAll('.q-btn').forEach(b=>{b.style.pointerEvents='none';if(b.textContent===q.answer)b.classList.add('correct');else if(b.textContent===sel&&!correct)b.classList.add('wrong');});

    if(correct){
        gs.correct++;playSound('correct');speakWord(q.speak);
        if(gs.qType==='obstacle'){
            // SHIELD! Smash through the next obstacle
            gs.shield=120; // ~2 seconds of shield
            gs.coins+=5;
            playSound('shield');
            showFB('🛡️ SHIELD!');
        } else {
            // Unlock coins
            if(gs.qTarget&&gs.qTarget.coins)gs.qTarget.coins.forEach(c=>c.locked=false);
            showFB('🪙 GO!');
        }
    } else {
        playSound('wrong');
        if(gs.qType==='obstacle'){
            showFB('❌ Jump!');
        } else {
            // Coins vanish
            if(gs.qTarget&&gs.qTarget.coins){gs.qTarget.coins.forEach(c=>{c.collected=true;});
            for(let i=0;i<5;i++)gs.particles.push({x:W*0.7,y:gs.groundY-30,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:20,color:'#888',size:3});}
            showFB('❌ '+q.answer);
        }
    }
    updateHUD();
    setTimeout(()=>{document.getElementById('q-bar').classList.remove('active');gs.qActive=false;gs.qType=null;gs.qTarget=null;
    if(gs.lives<=0){endGame(false);return;}if(gs.questionNum>=gs.questionsToWin){endGame(true);return;}},900);
}

// ===== GAME LOOP =====
function loop(){if(!gs.running)return;update();draw();gs.frame=requestAnimationFrame(loop);}

function update(){
    // GAME NEVER PAUSES - player always running
    const spd=gs.speed;
    gs.distance+=spd*0.06;gs.bgScrollX+=spd;gs.runFrame+=spd*0.06;
    gs.speed=Math.min(gs.maxSpeed,gs.speed+0.0005);
    if(gs.invincible>0)gs.invincible--;if(gs.shakeTimer>0)gs.shakeTimer--;if(gs.flashTimer>0)gs.flashTimer--;
    if(gs.shield>0)gs.shield--;

    // Gravity
    if(gs.jumping){gs.vy+=0.7;gs.py+=gs.vy;if(gs.py>=gs.groundY){gs.py=gs.groundY;gs.jumping=false;gs.vy=0;
    for(let i=0;i<4;i++)gs.dustParticles.push({x:gs.px-8+Math.random()*16,y:gs.groundY,vx:(Math.random()-0.5)*3,vy:-Math.random()*1.5,life:15+Math.random()*10,maxLife:25,size:2+Math.random()*3});}}

    // Running dust
    if(!gs.jumping&&Math.random()<0.3)gs.dustParticles.push({x:gs.px-5,y:gs.groundY-2,vx:-1.5-Math.random(),vy:-Math.random()*0.8,life:12+Math.random()*8,maxLife:20,size:2+Math.random()*2.5});

    // Spawn new events
    const rightEdge=gs.bgScrollX+W;
    while(gs.nextSpawnX < gs.bgScrollX + W + 300){spawnNext();}

    // Move obstacles
    gs.obstacles.forEach(ob=>{
        ob.x-=spd;
        // Trigger question when obstacle is visible on right side of screen
        if(!ob.triggered&&!ob.passed&&ob.x<W*0.82&&ob.x>W*0.5&&!gs.qActive){
            ob.triggered=true;
            showQ('obstacle',ob);
        }
        // Collision
        if(!ob.passed&&!ob.smashed&&gs.invincible<=0){
            const hit=gs.px+12>ob.x-ob.w/2+5&&gs.px-12<ob.x+ob.w/2-5&&gs.py>ob.y-ob.h+10;
            if(hit){
                if(gs.shield>0){
                    // SMASH through!
                    ob.smashed=true;ob.passed=true;
                    playSound('hit');gs.coins+=3;
                    for(let i=0;i<10;i++)gs.particles.push({x:ob.x,y:ob.y-20,vx:(Math.random()-0.5)*8,vy:-Math.random()*6,life:25,color:'#FFD93D',size:4+Math.random()*3});
                    showFB('💥');
                } else {
                    // CRASH
                    ob.passed=true;gs.lives--;gs.invincible=60;gs.shakeTimer=18;gs.flashTimer=12;playSound('hit');
                    for(let i=0;i<8;i++)gs.particles.push({x:gs.px+10,y:gs.py-25,vx:(Math.random()-0.5)*5,vy:-Math.random()*5,life:25,color:'#FF6B6B',size:4});
                    updateHUD();if(gs.lives<=0){endGame(false);return;}
                }
            }
        }
        if(!ob.passed&&ob.x<gs.px-30){ob.passed=true;gs.coins+=1;updateHUD();}
    });
    gs.obstacles=gs.obstacles.filter(ob=>ob.x>-60);

    // Coin groups - trigger question
    gs.coinGroups.forEach(cg=>{
        if(!cg.triggered&&!gs.qActive){
            const first=cg.coins.find(c=>!c.collected);
            if(first&&first.x<W*0.85&&first.x>W*0.4){
                cg.triggered=true;
                showQ('coins',cg);
            }
        }
    });

    // Move and collect coins
    gs.coinItems.forEach(c=>{c.x-=spd;c.bob+=0.08;
    if(!c.collected&&!c.locked){const dx=c.x-gs.px,dy=(c.y+Math.sin(c.bob)*4)-(gs.py-25);
    if(Math.abs(dx)<24&&Math.abs(dy)<24){c.collected=true;gs.coins+=3;playSound('coin');updateHUD();
    for(let i=0;i<4;i++)gs.particles.push({x:c.x,y:c.y,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:20,color:'#FFD93D',size:3});}}});
    gs.coinItems=gs.coinItems.filter(c=>!c.collected&&c.x>-30);
    gs.coinGroups=gs.coinGroups.filter(cg=>cg.coins.some(c=>!c.collected&&c.x>-30));

    // Scenery
    gs.sceneryItems.forEach(s=>{s.x-=spd*s.depth;});gs.sceneryItems=gs.sceneryItems.filter(s=>s.x>-60);
    while(gs.sceneryItems.length<5){const last=gs.sceneryItems[gs.sceneryItems.length-1];gs.sceneryItems.push({x:(last?.x||W)+100+Math.random()*150,emoji:currentTheme.scenery[Math.floor(Math.random()*currentTheme.scenery.length)],y:gs.groundY-15-Math.random()*30,scale:0.7+Math.random()*0.5,depth:0.3+Math.random()*0.4});}

    gs.groundDashes.forEach(d=>{d.x-=spd*0.8;if(d.x<-20)d.x=W+20;});
    gs.dustParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});gs.dustParticles=gs.dustParticles.filter(p=>p.life>0);
    gs.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});gs.particles=gs.particles.filter(p=>p.life>0);
    updateHUD();
}

// ===== DRAWING =====
function draw(){
    const t=currentTheme;let shX=0,shY=0;
    if(gs.shakeTimer>0){shX=(Math.random()-0.5)*10;shY=(Math.random()-0.5)*10;}
    ctx.save();ctx.translate(shX,shY);
    if(gs.flashTimer>0&&gs.flashTimer%2===0){ctx.fillStyle='rgba(255,50,50,0.12)';ctx.fillRect(0,0,W,H);}

    // Sky
    const sky=ctx.createLinearGradient(0,0,0,gs.groundY);sky.addColorStop(0,t.bg1);sky.addColorStop(1,lerp(t.bg1,'#ffffff',0.35));ctx.fillStyle=sky;ctx.fillRect(-10,-10,W+20,gs.groundY+10);

    // Clouds
    ctx.fillStyle='rgba(255,255,255,0.45)';for(let i=0;i<5;i++){const cx=(((-gs.bgScrollX*0.15)+i*280+100)%(W+250))-120;drawCloud(cx,40+i*28+Math.sin(i*1.7)*15,0.6+i*0.15);}

    // Scenery
    gs.sceneryItems.forEach(s=>{ctx.font=`${Math.floor(28*s.scale)}px serif`;ctx.textAlign='center';ctx.globalAlpha=0.5;ctx.fillText(s.emoji,s.x,s.y);ctx.globalAlpha=1;});

    // Ground
    const grd=ctx.createLinearGradient(0,gs.groundY,0,H);grd.addColorStop(0,t.ground||t.bg2);grd.addColorStop(0.05,t.bg2);grd.addColorStop(1,lerp(t.bg2,'#000000',0.4));ctx.fillStyle=grd;ctx.fillRect(-10,gs.groundY,W+20,H-gs.groundY+10);
    ctx.fillStyle=lerp(t.ground||t.bg2,'#ffffff',0.25);ctx.fillRect(-10,gs.groundY,W+20,3);
    ctx.fillStyle='rgba(0,0,0,0.08)';gs.groundDashes.forEach(d=>{ctx.fillRect(d.x,d.y,15,2);});
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=2;ctx.setLineDash([25,20]);ctx.lineDashOffset=-gs.bgScrollX*0.8;ctx.beginPath();ctx.moveTo(0,gs.groundY+4);ctx.lineTo(W,gs.groundY+4);ctx.stroke();ctx.setLineDash([]);

    // Dust
    gs.dustParticles.forEach(p=>{ctx.globalAlpha=(p.life/p.maxLife)*0.5;ctx.fillStyle='rgba(200,180,150,0.8)';ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;

    // Obstacles
    gs.obstacles.forEach(ob=>{
        if(ob.smashed)return;
        ctx.font=`${ob.h}px serif`;ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText(ob.emoji,ob.x,ob.y);
    });

    // Coins
    gs.coinItems.forEach(c=>{if(c.collected)return;const cy=c.y+Math.sin(c.bob)*4;
    if(c.locked){ctx.globalAlpha=0.3;ctx.fillStyle='#999';ctx.beginPath();ctx.arc(c.x,cy,9,0,Math.PI*2);ctx.fill();ctx.fillStyle='#777';ctx.beginPath();ctx.arc(c.x,cy,5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    else{ctx.fillStyle='rgba(255,217,61,0.25)';ctx.beginPath();ctx.arc(c.x,cy,14,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFD93D';ctx.beginPath();ctx.arc(c.x,cy,9,0,Math.PI*2);ctx.fill();ctx.fillStyle='#E6BE00';ctx.beginPath();ctx.arc(c.x,cy,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFD93D';ctx.font='bold 8px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',c.x,cy+1);}});

    // Particles
    gs.particles.forEach(p=>{ctx.globalAlpha=p.life/25;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;

    // Player
    const blink=gs.invincible>0&&Math.floor(gs.invincible/4)%2===0;
    if(!blink)drawPlayer(gs.px,gs.py);

    // Shield aura
    if(gs.shield>0){
        ctx.strokeStyle=`rgba(255,217,61,${0.3+Math.sin(gs.runFrame*5)*0.2})`;
        ctx.lineWidth=3;ctx.beginPath();ctx.arc(gs.px,gs.py-35,32+Math.sin(gs.runFrame*8)*3,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle=`rgba(255,217,61,${0.06+Math.sin(gs.runFrame*5)*0.04})`;ctx.beginPath();ctx.arc(gs.px,gs.py-35,30,0,Math.PI*2);ctx.fill();
    }

    // Progress bar
    const prog=gs.questionNum/gs.questionsToWin,barY=H-18,barW=W-30;
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.roundRect(15,barY,barW,10,5);ctx.fill();
    if(prog>0){ctx.fillStyle='#4ECDC4';ctx.beginPath();ctx.roundRect(15,barY,Math.max(10,barW*prog),10,5);ctx.fill();}
    ctx.fillStyle='#fff';ctx.font='bold 9px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`${gs.questionNum}/${gs.questionsToWin}`,W/2,barY+5);

    ctx.restore();
}

function drawPlayer(x,y){
    const running=!gs.jumping,leg=running?Math.sin(gs.runFrame*8):0.3,arm=running?Math.sin(gs.runFrame*8):-0.3,bob=running?Math.abs(Math.sin(gs.runFrame*8))*3:0;
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();const sh=gs.jumping?Math.max(0.3,1-(gs.groundY-y)/150):1;ctx.ellipse(x,gs.groundY+2,16*sh,4*sh,0,0,Math.PI*2);ctx.fill();
    const by=y-bob;
    ctx.fillStyle='#4A628A';ctx.save();ctx.translate(x-6,by-20);ctx.rotate(leg*0.6);ctx.fillRect(-4,0,9,20);ctx.fillStyle='#333';ctx.fillRect(-5,17,12,6);ctx.restore();
    ctx.fillStyle='#4A628A';ctx.save();ctx.translate(x+6,by-20);ctx.rotate(-leg*0.6);ctx.fillRect(-5,0,9,20);ctx.fillStyle='#333';ctx.fillRect(-6,17,12,6);ctx.restore();
    ctx.fillStyle='#4ECDC4';ctx.beginPath();ctx.roundRect(x-14,by-50,28,32,4);ctx.fill();ctx.fillStyle='#3BA99C';ctx.fillRect(x-14,by-50,28,5);ctx.fillStyle='#333';ctx.fillRect(x-14,by-22,28,3);
    ctx.fillStyle='#FFD93D';ctx.save();ctx.translate(x-16,by-46);ctx.rotate(-arm*0.7-0.2);ctx.fillRect(-3,0,8,22);ctx.fillStyle='#E6BE00';ctx.beginPath();ctx.arc(1,22,5,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.fillStyle='#FFD93D';ctx.save();ctx.translate(x+16,by-46);ctx.rotate(arm*0.7+0.2);ctx.fillRect(-5,0,8,22);ctx.fillStyle='#E6BE00';ctx.beginPath();ctx.arc(-1,22,5,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.fillStyle='#FFD93D';ctx.beginPath();ctx.roundRect(x-16,by-80,32,32,6);ctx.fill();ctx.fillStyle='#8B4513';ctx.beginPath();ctx.roundRect(x-16,by-82,32,10,[6,6,0,0]);ctx.fill();
    const blinkF=Math.floor(gs.runFrame*60)%180<5;ctx.fillStyle='#333';
    if(blinkF){ctx.fillRect(x-9,by-68,7,2);ctx.fillRect(x+3,by-68,7,2);}
    else{ctx.fillRect(x-9,by-72,7,9);ctx.fillRect(x+3,by-72,7,9);ctx.fillStyle='#fff';ctx.fillRect(x-6,by-71,3,4);ctx.fillRect(x+6,by-71,3,4);}
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x+1,by-56,6,0.1,Math.PI-0.1);ctx.stroke();
}
function drawCloud(x,y,s){ctx.beginPath();ctx.arc(x,y,18*s,0,Math.PI*2);ctx.arc(x+18*s,y-8*s,22*s,0,Math.PI*2);ctx.arc(x+40*s,y,18*s,0,Math.PI*2);ctx.fill();}

function endGame(won){gs.running=false;stopGame();const acc=gs.total>0?Math.round(gs.correct/gs.total*100):0,stars=acc>=85?3:acc>=55?2:1;
document.getElementById('result-icon').textContent=won?'🏆':'💥';document.getElementById('result-title').textContent=won?'FINISH LINE!':'GAME OVER';document.getElementById('result-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
document.getElementById('result-stats').innerHTML=`Coins: 🪙 ${gs.coins}<br>Distance: 📏 ${Math.floor(gs.distance)}m<br>Correct: ${gs.correct}/${gs.total} (${acc}%)`;showScreen('result-screen');}

function showFB(t){const el=document.getElementById('feedback');el.textContent=t;el.style.display='block';el.style.animation='none';el.offsetHeight;el.style.animation='fbPop 1s forwards';setTimeout(()=>el.style.display='none',1000);}
function updateHUD(){document.getElementById('hud-coins').textContent=gs.coins;document.getElementById('hud-dist').textContent=Math.floor(gs.distance);document.getElementById('hud-lives').innerHTML='❤️'.repeat(Math.max(0,gs.lives))+'🖤'.repeat(Math.max(0,3-gs.lives));}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function lerp(c1,c2,t){const h=s=>parseInt(s.slice(1),16);const v1=h(c1),v2=h(c2);const r=Math.round(((v1>>16)&255)*(1-t)+((v2>>16)&255)*t);const g=Math.round(((v1>>8)&255)*(1-t)+((v2>>8)&255)*t);const b=Math.round((v1&255)*(1-t)+(v2&255)*t);return`rgb(${r},${g},${b})`;}
</script>
